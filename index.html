<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | Juegos Educativos</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css?v=3">
    <style>
      @media screen and (orientation: portrait) {
        #unity-container {
          width: 100vh !important;
          height: 100vw !important;
          transform: rotate(90deg) translate(0, -100%) !important;
          transform-origin: top left !important;
          position: fixed !important;
          top: 0 !important;
          left: 0 !important;
          overflow: hidden !important;
        }
        body { overflow: hidden; background: black; }
      }
      @media screen and (orientation: landscape) {
        #unity-container {
          transform: none !important;
          width: 100% !important;
          height: 100% !important;
        }
      }
      .fs-fallback {
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100% !important; height: 100% !important;
        z-index: 99999 !important;
        background: black !important;
      }
      .fs-fallback #unity-canvas {
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=640 height=360 tabindex="-1" ontouchstart=""></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <button id="mi-fullscreen-btn" onclick="toggleFS()" title="Pantalla completa">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>
        </svg>
      </button>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");
      var fsBtn = document.getElementById('mi-fullscreen-btn');
      var fsActive = false;

      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)
        || (navigator.maxTouchPoints && navigator.maxTouchPoints > 1)
        || ('ontouchstart' in window);

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Juegos Educativos.loader.js";
      var config = {
        dataUrl: buildUrl + "/Juegos Educativos.data",
        frameworkUrl: buildUrl + "/Juegos Educativos.framework.js",
        codeUrl: buildUrl + "/Juegos Educativos.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Juegos Educativos",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      if (isMobile) {
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "640px";
        canvas.style.height = "360px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      function lockLandscape() {
        if (isMobile && screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(function() {});
        }
      }

      function unlockOrientation() {
        if (isMobile && screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      }

      function enterFS() {
        var req = container.requestFullscreen
          || container.webkitRequestFullscreen
          || container.mozRequestFullScreen;
        if (req) {
          try {
            var p = req.call(container);
            if (p && p.then) {
              p.then(function() {
                lockLandscape();
              }).catch(function() {
                container.classList.add('fs-fallback');
                lockLandscape();
              });
            } else {
              setTimeout(function() { lockLandscape(); }, 150);
            }
          } catch(e) {
            container.classList.add('fs-fallback');
            lockLandscape();
          }
        } else {
          container.classList.add('fs-fallback');
          lockLandscape();
        }
      }

      function exitFS() {
        unlockOrientation();
        container.classList.remove('fs-fallback');
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          (document.exitFullscreen || document.webkitExitFullscreen
            || document.mozCancelFullScreen).call(document);
        }
      }

      function setFSIcon(expanded) {
        fsBtn.innerHTML = expanded
          ? '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>'
          : '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>';
      }

      function toggleFS() {
        if (!fsActive) {
          fsActive = true;
          enterFS();
          setFSIcon(true);
        } else {
          fsActive = false;
          exitFS();
          setFSIcon(false);
        }
      }

      ['fullscreenchange', 'webkitfullscreenchange'].forEach(function(ev) {
        document.addEventListener(ev, function() {
          if (!document.fullscreenElement && !document.webkitFullscreenElement && fsActive) {
            fsActive = false;
            unlockOrientation();
            container.classList.remove('fs-fallback');
            setFSIcon(false);
          }
        });
      });
    </script>
  </body>
</html>
