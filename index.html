<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Juegos Educativos</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css?v=3">

  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=540 tabindex="-1" ontouchstart=""></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <button id="mi-fullscreen-btn" onclick="toggleFS()" title="Pantalla completa">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>
        </svg>
      </button>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Juegos Educativos.loader.js";
      var config = {
        dataUrl: buildUrl + "/Juegos Educativos.data",
        frameworkUrl: buildUrl + "/Juegos Educativos.framework.js",
        codeUrl: buildUrl + "/Juegos Educativos.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Juegos Educativos",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || 
                     (navigator.maxTouchPoints && navigator.maxTouchPoints > 1) || 
                     ('ontouchstart' in window);

      if (isMobile) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "540px";
      }

      if (isSafari && isMobile) {
        function touchToPointer(type, touch) {
          var evt = new PointerEvent(type, {
            pointerId: touch.identifier + 1,
            pointerType: 'touch',
            isPrimary: touch.identifier === 0,
            clientX: touch.clientX,
            clientY: touch.clientY,
            screenX: touch.screenX,
            screenY: touch.screenY,
            pageX: touch.pageX,
            pageY: touch.pageY,
            pressure: type === 'pointerup' ? 0 : 1,
            bubbles: true,
            cancelable: true,
          });
          canvas.dispatchEvent(evt);
        }

        canvas.addEventListener('touchstart', function(e) {
          canvas.focus();
          e.preventDefault();
          for (var i = 0; i < e.changedTouches.length; i++)
            touchToPointer('pointerdown', e.changedTouches[i]);
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) {
          e.preventDefault();
          for (var i = 0; i < e.changedTouches.length; i++)
            touchToPointer('pointermove', e.changedTouches[i]);
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
          e.preventDefault();
          for (var i = 0; i < e.changedTouches.length; i++)
            touchToPointer('pointerup', e.changedTouches[i]);
        }, { passive: false });

        canvas.addEventListener('touchcancel', function(e) {
          for (var i = 0; i < e.changedTouches.length; i++)
            touchToPointer('pointercancel', e.changedTouches[i]);
        }, { passive: false });
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      var fsBtn = document.getElementById('mi-fullscreen-btn');

      function isPortrait() {
        return window.innerHeight > window.innerWidth;
      }

      var portraitActive = false;
      var touchHandler = null;

      function remapTouchCoords(e) {
        var rect = canvas.getBoundingClientRect();
        var centerX = rect.left + rect.width / 2;
        var centerY = rect.top + rect.height / 2;

        var touches = e.changedTouches || e.touches;
        for (var i = 0; i < touches.length; i++) {
          var t = touches[i];
          var dx = t.clientX - centerX;
          var dy = t.clientY - centerY;
          Object.defineProperty(t, 'clientX', { value: centerX - dy, configurable: true });
          Object.defineProperty(t, 'clientY', { value: centerY + dx, configurable: true });
        }
      }

      function applyPortraitRotation() {
        canvas.style.position = 'fixed';
        canvas.style.width = '100vh';
        canvas.style.height = '100vw';
        canvas.style.maxWidth = 'none';
        canvas.style.maxHeight = 'none';
        canvas.style.top = '50vh';
        canvas.style.left = '50vw';
        canvas.style.zIndex = '99999';
        canvas.style.transform = 'translate(-50%, -50%) rotate(90deg)';
        canvas.style.transformOrigin = 'center center';
        container.style.position = 'fixed';
        container.style.top = '0';
        container.style.left = '0';
        container.style.width = '100%';
        container.style.height = '100%';
        container.style.background = 'black';
        container.style.zIndex = '9998';
        if (!portraitActive) {
          portraitActive = true;
          touchHandler = remapTouchCoords;
          canvas.addEventListener('touchstart', touchHandler, { passive: false, capture: true });
          canvas.addEventListener('touchmove', touchHandler, { passive: false, capture: true });
          canvas.addEventListener('touchend', touchHandler, { passive: false, capture: true });
        }
      }

      function removePortraitRotation() {
        canvas.style.position = '';
        canvas.style.width = '';
        canvas.style.height = '';
        canvas.style.maxWidth = '';
        canvas.style.maxHeight = '';
        canvas.style.top = '';
        canvas.style.left = '';
        canvas.style.zIndex = '';
        canvas.style.transform = '';
        canvas.style.transformOrigin = '';
        container.style.position = '';
        container.style.top = '';
        container.style.left = '';
        container.style.width = '';
        container.style.height = '';
        container.style.background = '';
        container.style.zIndex = '';
        if (portraitActive && touchHandler) {
          canvas.removeEventListener('touchstart', touchHandler, { capture: true });
          canvas.removeEventListener('touchmove', touchHandler, { capture: true });
          canvas.removeEventListener('touchend', touchHandler, { capture: true });
          touchHandler = null;
          portraitActive = false;
        }
      }


      function enterFS() {
        var req = container.requestFullscreen || container.webkitRequestFullscreen || container.mozRequestFullScreen;
        if (req) {
          try {
            var promise = req.call(container);
            if (promise && promise.then) {
              promise.then(function() {
                if (isPortrait()) applyPortraitRotation();
              }).catch(function(e) {
                console.warn('Fullscreen blocked, using fallback', e);
                container.classList.add('fs-fallback');
                if (isPortrait()) applyPortraitRotation();
              });
            } else {
              setTimeout(function() {
                if (isPortrait()) applyPortraitRotation();
              }, 150);
            }
          } catch (err) {
            console.warn('Fullscreen error, using fallback', err);
            container.classList.add('fs-fallback');
            if (isPortrait()) applyPortraitRotation();
          }
        } else {
          container.classList.add('fs-fallback');
          if (isPortrait()) applyPortraitRotation();
        }
      }

      function exitFS() {
        removePortraitRotation();
        container.classList.remove('fs-fallback');
        if (document.fullscreenElement) {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
          else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
        }
      }

      var fsActive = false;

      function toggleFS() {
        if (!fsActive) {
          fsActive = true;
          enterFS();
          fsBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>';
        } else {
          fsActive = false;
          exitFS();
          fsBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>';
        }
      }

      document.addEventListener('fullscreenchange', function() {
        if (!document.fullscreenElement && fsActive) {
          fsActive = false;
          removePortraitRotation();
          container.classList.remove('fs-fallback');
          fsBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>';
        }
      });

      document.addEventListener('webkitfullscreenchange', function() {
        if (!document.webkitFullscreenElement && fsActive) {
          fsActive = false;
          removePortraitRotation();
          container.classList.remove('fs-fallback');
          fsBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>';
        }
      });
    </script>
  </body>
</html>
