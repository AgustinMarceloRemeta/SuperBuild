<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Juegos Educativos</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=640 height=360 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <button id="mi-fullscreen-btn" onclick="toggleFS()" title="Pantalla completa">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/>
        </svg>
      </button>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Juegos Educativos.loader.js";
      var config = {
        dataUrl: buildUrl + "/Juegos Educativos.data",
        frameworkUrl: buildUrl + "/Juegos Educativos.framework.js",
        codeUrl: buildUrl + "/Juegos Educativos.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Juegos Educativos",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
                     (navigator.maxTouchPoints && navigator.maxTouchPoints > 1) ||
                     ('ontouchstart' in window);

      function applyRotation() {
        var w         = window.innerWidth;
        var h         = window.innerHeight;
        var shortSide = Math.min(w, h);
        var longSide  = Math.max(w, h);
        canvas.style.position        = 'fixed';
        canvas.style.width           = longSide + 'px';
        canvas.style.height          = shortSide + 'px';
        canvas.style.top             = '50%';
        canvas.style.left            = '50%';
        canvas.style.transform       = 'translate(-50%, -50%) rotate(90deg)';
        canvas.style.transformOrigin = 'center center';
        canvas.style.maxWidth        = 'none';
        canvas.style.maxHeight       = 'none';
        canvas.style.zIndex          = '9999';
        container.style.position     = 'fixed';
        container.style.top          = '0';
        container.style.left         = '0';
        container.style.width        = '100%';
        container.style.height       = '100%';
        container.style.background   = 'black';
        container.style.overflow     = 'hidden';
        container.style.zIndex       = '9998';
      }

      function remapPointer(e) {
        var rect    = canvas.getBoundingClientRect();
        var cx      = rect.left + rect.width  / 2;
        var cy      = rect.top  + rect.height / 2;
        var dx      = e.clientX - cx;
        var dy      = e.clientY - cy;
        var newX    = cx - dy;
        var newY    = cy + dx;
        Object.defineProperty(e, 'clientX', { value: newX, configurable: true });
        Object.defineProperty(e, 'clientY', { value: newY, configurable: true });
        Object.defineProperty(e, 'pageX',   { value: newX, configurable: true });
        Object.defineProperty(e, 'pageY',   { value: newY, configurable: true });
      }

      if (isMobile) {
        var meta = document.createElement('meta');
        meta.name    = 'viewport';
        meta.content = 'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className    = "unity-mobile";

        applyRotation();
        window.addEventListener('resize',            applyRotation);
        window.addEventListener('orientationchange', function() { setTimeout(applyRotation, 100); });

        ['pointerdown','pointermove','pointerup','pointercancel','mousedown','mousemove','mouseup'].forEach(function(evtName) {
          canvas.addEventListener(evtName, remapPointer, { passive: false, capture: true });
        });

        if (isSafari) {
          function touchToPointer(type, touch) {
            canvas.dispatchEvent(new PointerEvent(type, {
              pointerId:   touch.identifier + 1,
              pointerType: 'touch',
              isPrimary:   touch.identifier === 0,
              clientX:     touch.clientX,
              clientY:     touch.clientY,
              screenX:     touch.screenX,
              screenY:     touch.screenY,
              pageX:       touch.pageX,
              pageY:       touch.pageY,
              pressure:    type === 'pointerup' ? 0 : 1,
              bubbles:     true,
              cancelable:  true,
            }));
          }
          canvas.addEventListener('touchstart',  function(e) { canvas.focus(); e.preventDefault(); Array.from(e.changedTouches).forEach(function(t){ touchToPointer('pointerdown',   t); }); }, { passive: false });
          canvas.addEventListener('touchmove',   function(e) { e.preventDefault(); Array.from(e.changedTouches).forEach(function(t){ touchToPointer('pointermove',   t); }); }, { passive: false });
          canvas.addEventListener('touchend',    function(e) { e.preventDefault(); Array.from(e.changedTouches).forEach(function(t){ touchToPointer('pointerup',     t); }); }, { passive: false });
          canvas.addEventListener('touchcancel', function(e) { Array.from(e.changedTouches).forEach(function(t){ touchToPointer('pointercancel', t); }); }, { passive: false });
        }
      } else {
        canvas.style.width  = "640px";
        canvas.style.height = "360px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);

      var fsBtn = document.getElementById('mi-fullscreen-btn');

      function toggleFS() {
        var container = document.getElementById('unity-container');
        if (!document.fullscreenElement) {
          if (container.requestFullscreen) container.requestFullscreen();
          else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
          else if (container.mozRequestFullScreen) container.mozRequestFullScreen();
          fsBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>';
        } else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
          else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
          fsBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>';
        }
      }

      document.addEventListener('fullscreenchange', function() {
        if (!document.fullscreenElement) {
          fsBtn.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;fill:white"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>';
        }
      });
    </script>
  </body>
</html>
